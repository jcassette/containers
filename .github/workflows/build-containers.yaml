name: Build containers

on:
  schedule:
    - cron:  '0 12 * * 1'
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        container-name: [certbot, qbittorrent, wireguard]
    env:
      REGISTRY: ghcr.io
      USERNAME: ${{ github.repository_owner }}
      IMAGE_NAME: ${{ matrix.container-name }}
      IMAGE_PATH: ghcr.io/${{ github.repository_owner }}/${{ matrix.container-name }}
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Extract metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_PATH }}
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
          tags: |
            type=edge,branch=main
            type=schedule,pattern={{date 'YYYYMMDD'}}
      -
        name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.USERNAME }}
          password: ${{ github.token }}
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Build and push
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.container-name }}
          push: true
          annotations: ${{ steps.metadata.outputs.annotations }}
          labels: ${{ steps.metadata.outputs.labels }}
          tags: ${{ steps.metadata.outputs.tags }}
      -
        name: Attest build provenance
        continue-on-error: true
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_PATH }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true
      -
        name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_PATH }}@${{ steps.build-push.outputs.digest }}
          format: 'spdx-json'
          output-file: 'sbom.spdx.json'
      -
        name: Attest SBOM
        continue-on-error: true
        uses: actions/attest-sbom@v3
        with:
          subject-name: ${{ env.IMAGE_PATH }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          sbom-path: 'sbom.spdx.json'
          push-to-registry: true
      -
        name: Scan for vulnerabilities
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ env.IMAGE_PATH }}@${{ steps.build-push.outputs.digest }}
          format: 'sarif'
          output: 'trivy-results.sarif'
      -
        name: Upload vulnerability scan results
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
