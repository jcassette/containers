name: Build containers

on:
  schedule:
    - cron:  '0 12 * * 1'
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        container-name: [wireguard]
    continue-on-error: true
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Extract metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.actor }}/${{ matrix.container-name }}
          labels: |
            org.opencontainers.image.title=${{ matrix.container-name }}
          tags: |
            type=edge,branch=main
            type=schedule,pattern={{date 'YYYYMMDD'}}
      -
        name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Build and push
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.container-name }}
          push: true
          annotations: ${{ steps.metadata.outputs.annotations }}
          labels: ${{ steps.metadata.outputs.labels }}
          tags: ${{ steps.metadata.outputs.tags }}
      -
        name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.actor }}/${{ matrix.container-name }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true
